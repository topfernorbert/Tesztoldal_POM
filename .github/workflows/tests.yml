name: POM Playwright tesztek

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Python telepítése
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Csomagok telepítése
        run: pip install -r requirements.txt

      - name: Playwright böngészők telepítése
        run: playwright install chromium

      - name: Tesztek futtatása
        run: pytest tests/ -v
